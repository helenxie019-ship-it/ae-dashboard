<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AE攀爬机器人实单测试运营看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header .subtitle { color: #8b949e; font-size: 14px; }
    .date-selector {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .date-btn {
      padding: 10px 20px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #8b949e;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .date-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .date-btn.active {
      background: linear-gradient(135deg, #238636, #2ea043);
      border-color: #238636;
      color: #fff;
    }
    .kpi-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .kpi-card {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }
    .kpi-card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }
    .kpi-card.selected {
      border-color: #58a6ff;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .kpi-card.sku::before { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .kpi-card.tb::before { background: linear-gradient(90deg, #58a6ff, #79c0ff); }
    .kpi-card.pieces::before { background: linear-gradient(90deg, #a371f7, #bc8cff); }
    .kpi-card.agv::before { background: linear-gradient(90deg, #3fb950, #56d364); }
    .kpi-card.peak-eff::before { background: linear-gradient(90deg, #f0883e, #ffab70); }
    .kpi-card.avg-eff::before { background: linear-gradient(90deg, #2f81f7, #79c0ff); }
    .kpi-label { color: #e6edf3; font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }
    .kpi-value { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
    .kpi-card.sku .kpi-value { color: #ff7b72; }
    .kpi-card.tb .kpi-value { color: #79c0ff; }
    .kpi-card.pieces .kpi-value { color: #bc8cff; }
    .kpi-card.agv .kpi-value { color: #56d364; }
    .kpi-card.peak-eff .kpi-value { color: #ffab70; }
    .kpi-card.avg-eff .kpi-value { color: #79c0ff; }
    .kpi-change {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .kpi-change.up { color: #3fb950; }
    .kpi-change.down { color: #f85149; }
    .chart-container {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .chart-title { font-size: 24px; font-weight: 900; color: #e6edf3; text-transform: uppercase; letter-spacing: 2px; }
    .time-filter {
      display: flex;
      gap: 8px;
    }
    .time-filter-btn {
      padding: 8px 16px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #8b949e;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }
    .time-filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .time-filter-btn.active {
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-color: #58a6ff;
      color: #fff;
    }
    .indicator-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #30363d;
    }
    .indicator-btn {
      padding: 8px 16px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #8b949e;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      font-weight: 600;
    }
    .indicator-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .indicator-btn.active {
      background: linear-gradient(135deg, #238636, #2ea043);
      border-color: #238636;
      color: #fff;
    }
    .chart-wrapper { position: relative; height: 420px; }
    .summary-section {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-top: 20px;
    }
    .summary-title { font-size: 24px; font-weight: 900; margin-bottom: 20px; color: #e6edf3; text-transform: uppercase; letter-spacing: 2px; }
    .summary-content { color: #8b949e; line-height: 1.8; font-size: 14px; }
    .summary-content strong { color: #e6edf3; }
    .update-time { text-align: center; color: #6e7681; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AE攀爬机器人实单测试运营看板</h1>
    <div class="subtitle">每日运营数据监控</div>
  </div>

  <div class="date-selector" id="dateSelector"></div>

  <div class="kpi-cards" id="kpiCards">
    <div class="kpi-card sku" data-indicator="sku" onclick="selectIndicator('sku')">
      <div class="kpi-label">当日在库SKU数</div>
      <div class="kpi-value" id="skuValue">-</div>
      <div class="kpi-change" id="skuChange">
        <span id="skuTrend"></span>
        <span id="skuDiff"></span>
      </div>
    </div>
    <div class="kpi-card tb" data-indicator="tb" onclick="selectIndicator('tb')">
      <div class="kpi-label">当日2C出库TB数</div>
      <div class="kpi-value" id="tbValue">-</div>
      <div class="kpi-change" id="tbChange">
        <span id="tbTrend"></span>
        <span id="tbDiff"></span>
      </div>
    </div>
    <div class="kpi-card pieces" data-indicator="pieces" onclick="selectIndicator('pieces')">
      <div class="kpi-label">当日2C出库件数</div>
      <div class="kpi-value" id="piecesValue">-</div>
      <div class="kpi-change" id="piecesChange">
        <span id="piecesTrend"></span>
        <span id="piecesDiff"></span>
      </div>
    </div>
    <div class="kpi-card agv" data-indicator="agv" onclick="selectIndicator('agv')">
      <div class="kpi-label">启用AGV数</div>
      <div class="kpi-value" id="agvValue">-</div>
      <div class="kpi-change" id="agvChange">
        <span id="agvTrend"></span>
        <span id="agvDiff"></span>
      </div>
    </div>
    <div class="kpi-card peak-eff" data-indicator="peakEff" onclick="selectIndicator('peakEff')">
      <div class="kpi-label">峰值车效（车/时）</div>
      <div class="kpi-value" id="peakEffValue">-</div>
      <div class="kpi-change" id="peakEffChange">
        <span id="peakEffTrend"></span>
        <span id="peakEffDiff"></span>
      </div>
    </div>
    <div class="kpi-card avg-eff" data-indicator="avgEff" onclick="selectIndicator('avgEff')">
      <div class="kpi-label">平均车效（车/时）</div>
      <div class="kpi-value" id="avgEffValue">-</div>
      <div class="kpi-change" id="avgEffChange">
        <span id="avgEffTrend"></span>
        <span id="avgEffDiff"></span>
      </div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-header">
      <div class="chart-title" id="chartTitle">运营趋势图</div>
      <div class="time-filter">
        <button class="time-filter-btn active" data-range="7" onclick="changeTimeRange(7)">近7天</button>
        <button class="time-filter-btn" data-range="30" onclick="changeTimeRange(30)">近一个月</button>
        <button class="time-filter-btn" data-range="365" onclick="changeTimeRange(365)">近一年</button>
      </div>
    </div>
    <div class="indicator-filter" id="indicatorFilter">
      <button class="indicator-btn active" data-indicator="all" onclick="selectIndicator('all')">全部指标</button>
      <button class="indicator-btn" data-indicator="sku" onclick="selectIndicator('sku')">在库SKU数</button>
      <button class="indicator-btn" data-indicator="tb" onclick="selectIndicator('tb')">2C出库TB数</button>
      <button class="indicator-btn" data-indicator="pieces" onclick="selectIndicator('pieces')">2C出库件数</button>
      <button class="indicator-btn" data-indicator="agv" onclick="selectIndicator('agv')">启用AGV数</button>
      <button class="indicator-btn" data-indicator="peakEff" onclick="selectIndicator('peakEff')">峰值车效</button>
      <button class="indicator-btn" data-indicator="avgEff" onclick="selectIndicator('avgEff')">平均车效</button>
    </div>
    <div class="chart-wrapper">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="summary-section">
    <div class="summary-title">今日运营小结</div>
    <div class="summary-content" id="summaryContent">
      请选择日期查看当日运营情况...
    </div>
  </div>

  <div class="update-time">数据更新时间：<span id="updateTime"></span></div>

  <script>
    const rawData = {
      dates: ["3月29日","3月30日","3月31日","4月1日","4月2日","4月3日","4月4日","4月5日","4月6日","4月7日","4月8日","4月9日","4月10日","4月11日","4月12日","4月13日","4月14日","4月15日","4月16日","4月17日","4月18日","4月19日","4月20日","4月21日","4月22日"],
      sku: [0,115,77,142,197,199,297,291,512,555,531,559,632,651,671,676,736,892,887,1558,3360,4922,5035,5035,5035],
      tb: [13,168,186,295,153,111,295,702,547,765,516,360,344,326,420,425,397,366,348,323,356,462,590,448,448],
      pieces: [168,615,449,1008,270,290,1258,3954,3254,4566,2326,1335,1242,1363,1871,1831,1689,1457,1316,1283,1571,2216,2983,2781,1984],
      agv: [25,25,26,25,27,27,27,27,27,28,28,28,28,28,28,28,28,36,36,36,36,36,40,40,40],
      peakEff: [null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,86,149,165,171,178,186,160,173],
      avgEff: [null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,55,76,67]
    };

    const indicatorConfig = {
      sku: { label: '在库SKU数', color: 'rgba(248, 81, 73, 0.85)', borderColor: '#f85149' },
      tb: { label: '2C出库TB数', color: 'rgba(88, 166, 255, 0.85)', borderColor: '#58a6ff' },
      pieces: { label: '2C出库件数', color: 'rgba(163, 113, 247, 0.85)', borderColor: '#a371f7' },
      agv: { label: '启用AGV数', color: 'rgba(63, 185, 80, 0.85)', borderColor: '#3fb950' },
      peakEff: { label: '峰值车效（车/时）', color: 'rgba(240, 136, 62, 0.85)', borderColor: '#f0883e' },
      avgEff: { label: '平均车效（车/时）', color: 'rgba(47, 129, 247, 0.85)', borderColor: '#2f81f7' }
    };

    let currentIndex = Math.max(0, rawData.dates.length - 1);
    while (currentIndex > 0 && rawData.sku[currentIndex] === null && rawData.tb[currentIndex] === null) {
      currentIndex--;
    }

    let trendChart = null;
    let currentTimeRange = 7;
    let currentIndicator = 'all';

    function initDateSelector() {
      const container = document.getElementById('dateSelector');
      container.innerHTML = '';
      rawData.dates.forEach((date, index) => {
        const btn = document.createElement('button');
        btn.className = 'date-btn' + (index === currentIndex ? ' active' : '');
        btn.textContent = date;
        btn.onclick = () => selectDate(index);
        container.appendChild(btn);
      });
    }

    function selectDate(index) {
      currentIndex = index;
      document.querySelectorAll('.date-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
      updateKPIs();
      updateSummary();
    }

    function updateKPIs() {
      const indicators = [
        { key: 'sku', name: '在库SKU数' },
        { key: 'tb', name: '2C出库TB数' },
        { key: 'pieces', name: '2C出库件数' },
        { key: 'agv', name: '启用AGV数' },
        { key: 'peakEff', name: '峰值车效' },
        { key: 'avgEff', name: '平均车效' }
      ];

      indicators.forEach(ind => {
        const current = rawData[ind.key][currentIndex];
        const prev = currentIndex > 0 ? rawData[ind.key][currentIndex - 1] : null;

        const valueEl = document.getElementById(ind.key + 'Value');
        if (valueEl) valueEl.textContent = current !== null ? current : '-';

        const changeEl = document.getElementById(ind.key + 'Change');
        const trendEl = document.getElementById(ind.key + 'Trend');
        const diffEl = document.getElementById(ind.key + 'Diff');
        
        if (!changeEl || !trendEl || !diffEl) return;

        if (current !== null && prev !== null && prev !== 0) {
          const diff = current - prev;
          const percent = ((diff / prev) * 100).toFixed(1);

          if (diff > 0) {
            changeEl.className = 'kpi-change up';
            trendEl.textContent = '↑';
          } else if (diff < 0) {
            changeEl.className = 'kpi-change down';
            trendEl.textContent = '↓';
          } else {
            changeEl.className = 'kpi-change';
            trendEl.textContent = '→';
          }
          diffEl.textContent = Math.abs(diff) + ' (' + Math.abs(percent) + '%) 较昨日';
        } else {
          changeEl.className = 'kpi-change';
          trendEl.textContent = '';
          diffEl.textContent = currentIndex === 0 ? '首日数据' : '无对比数据';
        }
      });
    }

    function getDataByTimeRange(range) {
      const totalDays = rawData.dates.length;
      let startIndex = 0;
      
      if (range === 7) {
        startIndex = Math.max(0, totalDays - 7);
      } else if (range === 30) {
        startIndex = Math.max(0, totalDays - 30);
      } else if (range === 365) {
        startIndex = Math.max(0, totalDays - 365);
      }
      
      return {
        labels: rawData.dates.slice(startIndex),
        startIndex: startIndex
      };
    }

    function getDatasetsForIndicator(indicator, startIndex) {
      const datasets = [];
      const keys = indicator === 'all' ? ['sku', 'tb', 'pieces', 'agv', 'peakEff', 'avgEff'] : [indicator];
      
      keys.forEach(key => {
        const config = indicatorConfig[key];
        const data = rawData[key].slice(startIndex).map(v => v === null ? 0 : v);
        
        // 检查是否全部为空
        const hasData = rawData[key].slice(startIndex).some(v => v !== null);
        if (!hasData) return;
        
        datasets.push({
          label: config.label,
          data: data,
          backgroundColor: config.color,
          borderColor: config.borderColor,
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: indicator === 'all' ? 0.6 : 0.5,
          categoryPercentage: indicator === 'all' ? 0.8 : 0.7
        });
      });
      
      return datasets;
    }

    function selectIndicator(indicator) {
      currentIndicator = indicator;
      
      // 更新KPI卡片选中状态
      document.querySelectorAll('.kpi-card').forEach(card => {
        card.classList.toggle('selected', card.dataset.indicator === indicator);
      });
      
      // 更新指标按钮状态
      document.querySelectorAll('.indicator-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.indicator === indicator);
      });
      
      // 更新图表标题
      const titles = {
        all: '运营趋势图 - 全部指标',
        sku: '运营趋势图 - 在库SKU数',
        tb: '运营趋势图 - 2C出库TB数',
        pieces: '运营趋势图 - 2C出库件数',
        agv: '运营趋势图 - 启用AGV数',
        peakEff: '运营趋势图 - 峰值车效',
        avgEff: '运营趋势图 - 平均车效'
      };
      document.getElementById('chartTitle').textContent = titles[indicator] || '运营趋势图';
      
      // 更新图表
      updateChart();
    }

    function changeTimeRange(range) {
      currentTimeRange = range;
      
      document.querySelectorAll('.time-filter-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.range) === range);
      });
      
      updateChart();
    }

    function updateChart() {
      const rangeData = getDataByTimeRange(currentTimeRange);
      const datasets = getDatasetsForIndicator(currentIndicator, rangeData.startIndex);
      
      if (trendChart) {
        trendChart.data.labels = rangeData.labels;
        trendChart.data.datasets = datasets;
        trendChart.update();
      }
    }

    function initChart() {
      const ctx = document.getElementById('trendChart');
      if (!ctx) return;

      const rangeData = getDataByTimeRange(currentTimeRange);
      const datasets = getDatasetsForIndicator(currentIndicator, rangeData.startIndex);

      trendChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rangeData.labels,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              position: 'top',
              labels: { 
                color: '#e6edf3', 
                padding: 15, 
                font: { size: 14, weight: 'bold' }, 
                usePointStyle: true, 
                pointStyle: 'rectRounded' 
              }
            },
            tooltip: {
              backgroundColor: 'rgba(22, 27, 34, 0.95)',
              borderColor: '#30363d',
              borderWidth: 1,
              titleColor: '#e6edf3',
              bodyColor: '#8b949e',
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) label += ': ';
                  const dataIndex = context.dataIndex;
                  const rangeData = getDataByTimeRange(currentTimeRange);
                  
                  // 找到对应的数据key
                  let dataKey = null;
                  for (const [key, config] of Object.entries(indicatorConfig)) {
                    if (config.label === context.dataset.label) {
                      dataKey = key;
                      break;
                    }
                  }
                  
                  if (dataKey) {
                    const originalValue = rawData[dataKey][rangeData.startIndex + dataIndex];
                    label += originalValue !== null ? originalValue : '无数据';
                  } else {
                    label += context.parsed.y;
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#8b949e', font: { size: 12, weight: 'bold' } },
              grid: { color: '#30363d', drawBorder: false }
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#8b949e', font: { size: 11 } },
              grid: { color: '#30363d', drawBorder: false },
              title: { display: true, text: '数值', color: '#8b949e', font: { size: 12 } }
            }
          }
        }
      });
    }

    function updateSummary() {
      const date = rawData.dates[currentIndex];
      const sku = rawData.sku[currentIndex];
      const tb = rawData.tb[currentIndex];
      const pieces = rawData.pieces[currentIndex];
      const agv = rawData.agv[currentIndex];
      const peakEff = rawData.peakEff[currentIndex];
      const avgEff = rawData.avgEff[currentIndex];

      if (sku === null && tb === null && pieces === null && agv === null && peakEff === null && avgEff === null) {
        document.getElementById('summaryContent').innerHTML = '<strong>' + date + '</strong> 暂无运营数据。';
        return;
      }

      const validSku = rawData.sku.filter(v => v !== null);
      const validTb = rawData.tb.filter(v => v !== null);
      const validPieces = rawData.pieces.filter(v => v !== null);
      const validPeakEff = rawData.peakEff.filter(v => v !== null);
      const validAvgEff = rawData.avgEff.filter(v => v !== null);

      const avgSku = validSku.length > 0 ? Math.round(validSku.reduce((a, b) => a + b, 0) / validSku.length) : 0;
      const avgTb = validTb.length > 0 ? Math.round(validTb.reduce((a, b) => a + b, 0) / validTb.length) : 0;
      const avgPieces = validPieces.length > 0 ? Math.round(validPieces.reduce((a, b) => a + b, 0) / validPieces.length) : 0;

      let summary = '<strong>' + date + '</strong> 运营情况：<br>';

      if (sku !== null) {
        summary += '• 当日在库SKU数达到 <strong style="color:#ff7b72">' + sku + '</strong> 个，';
        summary += sku > avgSku ? '高于平均值 ' + avgSku + ' 个，库存规模持续扩大。' : '低于平均值 ' + avgSku + ' 个。';
        summary += '<br>';
      }

      if (tb !== null) {
        summary += '• 2C出库TB数为 <strong style="color:#79c0ff">' + tb + '</strong>，';
        summary += tb > avgTb ? '高于平均水平，出库效率良好。' : '处于正常水平。';
        summary += '<br>';
      }

      if (pieces !== null) {
        summary += '• 2C出库件数 <strong style="color:#bc8cff">' + pieces + '</strong> 件，';
        summary += pieces > avgPieces ? '订单处理量表现优异。' : '订单量平稳。';
        summary += '<br>';
      }

      if (agv !== null) {
        summary += '• 启用AGV数 <strong style="color:#56d364">' + agv + '</strong> 台，机器人运转正常。';
        summary += '<br>';
      }

      if (peakEff !== null) {
        summary += '• 峰值车效 <strong style="color:#ffab70">' + peakEff + '</strong> 车/时，';
        summary += 'AGV峰值运载能力表现' + (peakEff > (validAvgEff.length > 0 ? validAvgEff.reduce((a,b)=>a+b,0)/validAvgEff.length : 0) ? '优异。' : '稳定。');
        summary += '<br>';
      }

      if (avgEff !== null) {
        summary += '• 平均车效 <strong style="color:#79c0ff">' + avgEff + '</strong> 车/时，';
        summary += 'AGV平均运载效率运行正常。';
      }

      document.getElementById('summaryContent').innerHTML = summary;
    }

    function setUpdateTime() {
      const now = new Date();
      document.getElementById('updateTime').textContent =
        now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' +
        String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    document.addEventListener('DOMContentLoaded', function() {
      initDateSelector();
      initChart();
      updateKPIs();
      updateSummary();
      setUpdateTime();
    });
  </script>
</body>
</html>
